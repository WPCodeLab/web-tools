<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom Markdown Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-glow"></div>
  <main class="app">
    <header class="app-header">
      <div>
        <p class="kicker">Markdown Studio</p>
        <h1>Bloom Viewer</h1>
      </div>
      <div class="toolbar">
        <label for="fileInput" class="button secondary">Open .md</label>
        <input id="fileInput" type="file" accept=".md,.markdown,text/markdown,text/plain" hidden />
        <button id="sampleBtn" class="button secondary" type="button">Load Sample</button>
        <button id="downloadBtn" class="button" type="button">Download .md</button>
        <button id="clearBtn" class="button ghost" type="button">Clear</button>
      </div>
    </header>

    <section class="meta" aria-live="polite">
      <span id="wordCount">0 words</span>
      <span id="charCount">0 characters</span>
      <span id="readTime">0 min read</span>
      <span id="storageStatus">Local save: idle</span>
    </section>

    <section class="panes">
      <article class="panel input-panel">
        <h2>Editor</h2>
        <textarea id="markdownInput" placeholder="# Write markdown here...\n\nTry headings, lists, tables, code blocks, and quotes."></textarea>
      </article>

      <article class="panel preview-panel">
        <h2>Preview</h2>
        <div id="preview" class="preview" aria-label="Rendered markdown preview"></div>
      </article>
    </section>
  </main>

  <div id="dropOverlay" class="drop-overlay" aria-hidden="true">
    <div class="drop-overlay-card">
      <p class="drop-overlay-kicker">Drop to Import</p>
      <h2>Drop your markdown file anywhere</h2>
      <p>Supports .md, .markdown, and plain text files.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
